<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sandbox</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
            user-select: none;
        }

        h1 {
            margin: 0 0 10px 0;
            font-size: 24px;
            letter-spacing: 1px;
        }

        #sandbox-container {
            display: flex;
            gap: 20px;
            background-color: #2a2a2a;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        canvas {
            background-color: #000000;
            border: 2px solid #444;
            border-radius: 4px;
            cursor: crosshair;
        }

        #ui-panel {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 500px;
        }

        .panel-section {
            border: 1px solid #444;
            padding: 10px;
            border-radius: 6px;
            background: #222;
        }

        .panel-title {
            font-size: 12px;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 6px;
        }

        button {
            padding: 8px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            transition: transform 0.1s, filter 0.1s;
            color: #fff;
            text-shadow: 0 1px 2px rgba(0,0,0,0.6);
        }

        button:hover {
            transform: scale(1.03);
            filter: brightness(1.2);
        }

        button.active {
            outline: 2px solid #fff;
            box-shadow: 0 0 8px rgba(255,255,255,0.5);
        }

        button:disabled {
            background-color: #333333;
            color: #777777;
            text-shadow: none;
            cursor: not-allowed;
            pointer-events: none;
            transform: none !important;
            filter: none !important;
            box-shadow: none;
        }

        #clear-btn {
            background-color: #d9534f;
            width: 100%;
            margin-top: auto;
        }

        #pause-btn {
            background-color: #ff3737;
            width: 100%;
            margin-top: auto;
        }

        #pause-btn.running {
            background-color: #6cff37;
        }

        #brush-slider {
            width: 100%;
        }

        .controls-text {
            font-size: 11px;
            color: #aaa;
            margin-top: 5px;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>Elemental Sandbox</h1>

    <h2 id="DEBUG"></h2>

    <div id="#sandbox-container" style="display: flex; gap: 20px;">
        <div id="sandbox-container">
            <canvas id="sandbox" width="800" height="700"></canvas>
            
            <div id="ui-panel">
                <div class="panel-section">
                    <div class="panel-title">Elements</div>
                    <div class="btn-grid" id="element-buttons"></div>
                </div>

                <div class="panel-section">
                    <div class="panel-title">Brush Size: <span id="brush-val">3</span></div>
                    <input type="range" id="brush-slider" min="1" max="20" value="3">
                </div>
                
                <button id="pause-btn">Pause / Resume</button>
                <button id="clear-btn">Clear Canvas</button>
                <button id="reset-btn">Reset Progress</button>
                <div class="controls-text">Click & Drag to draw</div>
            </div>
        </div>
    </div>

<script src="index.js"></script>
</body>
</html>
