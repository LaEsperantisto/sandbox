<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <title>Sandbox</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
            user-select: none;
        }

        h1 {
            margin: 0 0 10px 0;
            font-size: 24px;
            letter-spacing: 1px;
        }

        #sandbox-container {
            display: flex;
            gap: 20px;
            background-color: #2a2a2a;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            position: relative;
        }

        canvas {
            background-color: #000000;
            border: 2px solid #444;
            border-radius: 4px;
            cursor: crosshair;
        }

        #ui-panel {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 900px;
        }

        .panel-section {
            border: 1px solid #444;
            padding: 10px;
            border-radius: 6px;
            background: #222;
        }

        .panel-title {
            font-size: 12px;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 6px;
        }

        button {
            padding: 8px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            transition: transform 0.1s, filter 0.1s;
            color: #fff;
            text-shadow: 0 1px 2px rgba(0,0,0,0.6);
        }

        button:hover {
            transform: scale(1.03);
            filter: brightness(1.2);
        }

        button.active {
            outline: 2px solid #fff;
            box-shadow: 0 0 8px rgba(255,255,255,0.5);
        }

        button:disabled {
            background-color: #333333;
            color: #777777;
            text-shadow: none;
            cursor: not-allowed;
            pointer-events: none;
            transform: none !important;
            filter: none !important;
            box-shadow: none;
        }

        #clear-btn {
            background-color: #d9534f;
            width: 100%;
        }

        #pause-btn {
            background-color: #ff3737;
            width: 100%;
        }

        #pause-btn.running {
            background-color: #6cff37;
        }

        #book-btn {
            background-color: #0275d8;
            width: 100%;
        }

        #brush-slider {
            width: 100%;
        }

        #temp-slider {
            width: 100%;
        }

        .controls-text {
            font-size: 11px;
            color: #aaa;
            margin-top: 5px;
            text-align: center;
        }

        /* --- Discovery Book Modal Styles --- */
        #book-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        #book-content {
            background-color: #2c2c2c;
            border: 2px solid #555;
            border-radius: 12px;
            width: 80%;
            max-width: 800px;
            height: 80vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }

        #book-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #444;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        #book-close {
            background-color: #d9534f;
            padding: 6px 14px;
        }

        #book-body {
            flex: 1;
            overflow-y: auto;
            padding-right: 10px;
        }

        .book-section {
            margin-bottom: 25px;
        }

        .book-section-title {
            font-size: 16px;
            color: #4a90e2;
            text-transform: uppercase;
            border-bottom: 1px solid #444;
            padding-bottom: 4px;
            margin-bottom: 12px;
            font-weight: bold;
        }

        .book-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 12px;
        }

        .book-card {
            background: #1e1e1e;
            border: 1px solid #3d3d3d;
            border-radius: 6px;
            padding: 10px;
        }

        .book-card-title {
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .color-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            border: 1px solid #555;
        }

        .book-card-prop {
            font-size: 11px;
            color: #bbb;
            margin: 2px 0;
        }

        #info-label {
            position: fixed;
            pointer-events: none;
            transform: translate(15px, 15px);
            background-color: rgba(0, 0, 0, 0.85);
            color: #fff;
            padding: 6px 10px;
            border-radius: 4px;
            font-family: monospace;
            z-index: 9999;
        }

        #reset-temp-btn {
            color: #f90101;
        }
    </style>
</head>
<body>

    <h1>Elemental Sandbox</h1>

    <h4 id="info-label">Hovering: Outside Sandbox</h4>

    <div id="#sandbox-container" style="display: flex; gap: 20px;">
        <div id="sandbox-container">
            <canvas id="sandbox" width="900" height="900"></canvas>
            
            <div id="ui-panel">
                <div class="panel-section">
                    <div class="panel-title">Elements</div>
                    <div class="btn-grid" id="particle-buttons"></div>
                </div>

                <div class="panel-section">
                    <div class="panel-title">Brush Size: <span id="brush-val">3</span></div>
                    <input type="range" id="brush-slider" min="1" max="20" value="3">
                </div>

                <div class="control-group">
                    <label for="temp-slider">Temperature (°K):</label>
                    <input type="range" id="temp-slider" min="0" max="3000" value="293"> 
                    
                    <input type="number" id="temp-input" min="0" value="293" style="width: 70px; margin-left: 10px;">
                    
                    <span id="temp-val" style="display:none;">294</span>
                    <span id="temp-val-celsius">20</span>°C / 
                    <span id="temp-val-fahrenheit">69</span>°F
                    <br>
                    <button id="reset-temp-btn">Reset to room temperature</button>
                </div>
                
                <button id="book-btn">📖 View Discovery Book</button>
                <button id="pause-btn">Pause / Resume</button>
                <button id="clear-btn">Clear Canvas</button>
                <button id="reset-btn">Reset Progress</button>
                <div class="controls-text">Click & Drag to draw</div>
            </div>
        </div>
    </div>

    <div id="book-modal">
        <div id="book-content">
            <div id="book-header">
                <h2 style="margin:0;">Discovery Logbook</h2>
                <button id="book-close">Close</button>
            </div>
            <div id="book-body"></div>
        </div>
    </div>

    <a href="https://docs.google.com/forms/d/e/1FAIpQLSfY4wz14YYvCN2I1p5sAWV_fDqpf2tNBiCTnnyZ2QC6Dr2qMQ/viewform?usp=publish-editor" id="feedback-form">Feedback form</iframe>

<script type="module" src="index.js"></script>
</body>
</html>
